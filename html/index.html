<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⑨ 琪露诺的超级冰窖 ⑨</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./main.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --cirno-light: #E1F5FE;
            --cirno-blue: #03A9F4;
            --cirno-dark: #0288D1;
            --cirno-ice: rgba(255, 255, 255, 0.9);
        }
        body {
            font-family: 'ZCOOL KuaiLe', cursive;
            background: linear-gradient(180deg, #B3E5FC 0%, #E1F5FE 100%);
            min-height: 100vh;
            color: #1A237E;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: var(--cirno-ice);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 2px solid white;
            box-shadow: 0 8px 32px rgba(3, 169, 244, 0.15);
        }
        .baka-float {
            animation: baka-float 4s ease-in-out infinite;
        }
        @keyframes baka-float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .file-card:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.5);
        }
        /* 登录按钮样式 - 保持原有的好看样式 */
        .login-btn {
            background: linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%);
            color: white;
            border: 2px solid white;
            box-shadow: 0 4px 12px rgba(41, 182, 246, 0.3);
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #29B6F6 0%, #0288D1 100%);
            transform: translateY(-2px);
        }
        /* 下载按钮样式 - 淡蓝色圆角方框，透明背景 */
        .download-btn {
            background: transparent;
            border: 2px solid #4FC3F7;
            color: #0288D1;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: rgba(79, 195, 247, 0.1);
            transform: translateY(-1px);
        }
        .ops-btn {
            background: transparent;
            border: 2px solid #4FC3F7;
            color: #0288D1;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .ops-btn:hover {
            background: rgba(79, 195, 247, 0.1);
            transform: translateY(-1px);
        }
        .picker-dir:hover {
            background: rgba(3, 169, 244, 0.08);
        }
        @keyframes dropDown {
            from { opacity: 0; transform: translateY(-6px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #81D4FA; border-radius: 10px; }
        .footer {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .footer a { color: #94a3b8; text-decoration: none; }
        .footer a:hover { color: #38bdf8; }
        .footer .sep { margin: 0 0.5rem; }

        /* ── 漫画海报封面网格 ───────────────────── */
        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 0.5rem;
        }
        @media (min-width: 768px) {
            .manga-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.25rem; }
        }
        .poster {
            position: relative;
            aspect-ratio: 3 / 4;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: linear-gradient(135deg, #B3E5FC, #E1F5FE);
            box-shadow: 0 4px 16px rgba(3, 169, 244, 0.18);
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .poster:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 28px rgba(3, 169, 244, 0.35);
        }
        .poster-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform .4s ease;
        }
        .poster:hover .poster-img { transform: scale(1.06); }
        /* 占位（封面还没加载/无封面）*/
        .poster-placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; opacity: .35;
        }
        /* 底部毛玻璃条：标题 + 汉化组 */
        .poster-glass {
            position: absolute; left: 0; right: 0; bottom: 0;
            padding: 0.6rem 0.7rem 0.65rem;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px) saturate(1.4);
            -webkit-backdrop-filter: blur(12px) saturate(1.4);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
        }
        .poster-title {
            font-size: 0.94rem;
            font-weight: 600;
            color: #0a3a52;
            line-height: 1.25;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        .poster-sub {
            margin-top: 2px;
            font-size: 0.75rem;
            color: #01579b;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-overflow: ellipsis;
        }
        /* 页数徽章（右上）*/
        .poster-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(2, 136, 209, 0.85);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 999px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        /* 来源徽章（左上，e-hentai / B站）*/
        .poster-source {
            position: absolute; top: 8px; left: 8px;
            background: rgba(255,255,255,0.8);
            color: #0288D1;
            font-size: 0.65rem;
            font-weight: 400;
            padding: 2px 7px;
            border-radius: 999px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        /* 汉化组分组卡片（第1层）的封面墙拼图 */
        .group-card {
            position: relative;
            aspect-ratio: 3 / 4;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(3, 169, 244, 0.18);
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .group-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 28px rgba(3,169,244,0.35); }
        .group-wall {
            position: absolute; inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            background: #B3E5FC;
        }
        .group-wall img { width: 100%; height: 100%; object-fit: cover; }
        .group-wall .empty { background: linear-gradient(135deg,#B3E5FC,#E1F5FE); }
        .group-glass {
            position: absolute; left: 0; right: 0; bottom: 0;
            padding: 0.7rem 0.8rem;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            border-top: 1px solid rgba(255,255,255,0.6);
        }
        .group-name { font-size: 0.9rem; font-weight: 800; color: #0a3a52; line-height: 1.2;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .group-count { margin-top: 2px; font-size: 0.65rem; color: #0288D1; }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-5xl mx-auto">

    <!-- 鉴权模式全屏登录 -->
    <div v-if="authMode && !isLoggedIn" class="min-h-screen flex items-center justify-center -mt-8">
        <div class="glass p-8 w-full max-w-sm">
            <div class="flex flex-col items-center mb-6">
                <img src="baka.png" class="w-20 h-20 baka-float mb-3" alt="baka">
                <h2 class="text-2xl font-black text-sky-700">⑨ 冰窖需要身份验证</h2>
                <p class="text-sky-500 text-xs mt-1">登录后才能进入</p>
            </div>
            <input v-model="loginForm.username" type="text" placeholder="名字"
                class="w-full mb-3 p-3 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-300 outline-none text-sm">
            <input v-model="loginForm.password" type="password" placeholder="口令"
                @keyup.enter="handleLogin"
                class="w-full mb-4 p-3 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-300 outline-none text-sm">
            <button @click="handleLogin"
                class="w-full bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">
                认领身份
            </button>
            <div class="footer" style="padding-top:1.25rem; padding-bottom:0;">
                <a href="https://github.com/northwindlight/bakaWFS" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
    </div>

    <template v-if="!authMode || isLoggedIn">
    <header class="flex flex-col items-center mb-8 relative">
        <div class="absolute -top-2 -right-2 md:right-0 md:top-0 transform scale-90 md:scale-100 origin-top-right z-10">
            <button @click="isLoggedIn ? handleLogout() : (showLogin = !showLogin)"
            class="login-btn group flex items-center gap-2 px-4 py-2 rounded-2xl transition-all duration-300">
                <span class="text-xl group-hover:rotate-12 transition-transform">{{ isLoggedIn ? '❄️' : '🧊' }}</span>
                <div class="flex flex-col items-start leading-none">
                    <span class="text-[10px] opacity-50 tracking-widest uppercase">Identity</span>
                    <span class="text-sm font-bold">{{ isLoggedIn ? currentUser : '点击登录 ⑨' }}</span>
                </div>
            </button>
        </div>

        <img src="baka.png" 
            class="w-16 h-16 md:w-24 md:h-24 baka-float mb-2 transition-all duration-300" 
            alt="baka">

        <h1 class="text-2xl md:text-4xl lg:text-5xl font-black text-sky-700 tracking-tighter drop-shadow-sm text-center px-2">
            ⑨ 琪露诺的超级冰窖 ⑨ 
        </h1>
        
        <p class="text-sky-500 mt-2 text-xs md:text-sm">就算是笨蛋,也能保管好东西!</p>
    </header>
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div v-if="showLogin && !isLoggedIn" class="lg:col-span-1">
            <div class="glass p-6 sticky top-8">
                <h3 class="text-xl mb-4 text-sky-800">你是谁?</h3>
                <input v-model="loginForm.username" type="text" placeholder="名字" class="w-full mb-3 p-2 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-300 outline-none text-sm">
                <input v-model="loginForm.password" type="password" placeholder="口令" class="w-full mb-4 p-2 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-300 outline-none text-sm">
                <button @click="handleLogin" class="w-full bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">认领身份</button>
            </div>
        </div>

        <div :class="(!isLoggedIn && showLogin) ? 'lg:col-span-3' : 'lg:col-span-4'">
            <div class="glass min-h-[600px] flex flex-col">
                
                <nav class="p-3 border-b border-sky-50 flex items-center gap-2">
                    <!-- 返回上一级 -->

                    <button @click="goHome"
                            class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg bg-sky-100/50 text-sky-600 text-lg hover:bg-sky-200 transition">
                        🏠
                    </button>

                    <button @click="pathStack.length === 1 ? goHome() : goToLevel(pathStack.length - 2)"
                            :disabled="pathStack.length === 0"
                            class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg bg-sky-100/50 text-sky-600 font-bold text-lg hover:bg-sky-200 transition disabled:opacity-30 disabled:cursor-not-allowed">
                        ←
                    </button>
                    

                    <!-- 路径显示（不可点击，小字） -->
                    <div class="flex-1 min-w-0 flex flex-col justify-center">
                        <span class="text-[11px] text-sky-400 truncate select-none leading-tight" :title="'/' + pathStack.map(p => p.name).join('/')">
                            <span class="opacity-60">/</span><span v-if="pathStack.length === 0" class="opacity-40">根目录</span><template v-for="(seg, i) in pathStack" :key="i"><span>{{ seg.name }}</span><span v-if="i < pathStack.length - 1" class="opacity-40">/</span></template>
                        </span>
                    </div>

                    <!-- 搜索框（整库搜，融入漫画站风格） -->
                    <div class="relative shrink-0 w-32 sm:w-44">
                        <input v-model="searchQuery" type="text" placeholder="🔍 搜全库..."
                               class="w-full pl-3 pr-7 py-2 rounded-xl border-none ring-2 ring-sky-100 focus:ring-sky-400 outline-none text-xs bg-white/60 text-sky-700 placeholder:text-sky-300 transition">
                        <button v-if="searchQuery" @click="clearSearch"
                                class="absolute right-1.5 top-1/2 -translate-y-1/2 text-sky-300 hover:text-sky-600 text-sm leading-none">×</button>
                    </div>

                    <!-- 新建文件夹（仅 admin） -->
                    <button v-if="isAdmin" @click="openMkdirModal"
                            class="shrink-0 flex items-center gap-1.5 bg-sky-100/50 text-sky-600 px-3 py-2 rounded-xl text-sm font-bold hover:bg-sky-200 active:scale-95 transition select-none border-2 border-sky-200">
                        📁+
                    </button>

                    <!-- 上传 下拉按钮（仅 admin） -->
                    <div v-if="isAdmin" class="relative shrink-0">
                        <button @click="showUploadMenu = !showUploadMenu"
                                class="flex items-center gap-1.5 bg-sky-500 text-white px-3 py-2 rounded-xl text-sm font-bold shadow-lg shadow-sky-200 hover:bg-sky-600 active:scale-95 transition select-none">
                            <span>⬆ 上传</span>
                            <span class="text-xs opacity-70 transition-transform duration-200" :class="showUploadMenu ? 'rotate-180' : ''">▼</span>
                            <span v-if="Object.keys(progressData).length > 0" class="absolute -top-1 -right-1 flex h-2.5 w-2.5 rounded-full bg-red-500 border-2 border-white"></span>
                        </button>

                        <!-- 下拉菜单 -->
                        <div v-if="showUploadMenu"
                             class="absolute right-0 top-full mt-2 w-44 glass shadow-xl z-30 overflow-hidden rounded-2xl border border-white/80"
                             style="animation: dropDown 0.15s ease-out">
                            <!-- 本地上传 -->
                            <label class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-sky-50 transition text-sky-700 font-bold text-sm border-b border-sky-50">
                                <span class="text-lg">📂</span>
                                <span>本地上传</span>
                                <input type="file" @change="handleFileUpload($event); showUploadMenu = false" class="hidden">
                            </label>
                            <!-- 远程搬运 -->
                            <button @click="openRemoteModal(); showUploadMenu = false"
                                    class="w-full flex items-center gap-3 px-4 py-3 hover:bg-sky-50 transition text-sky-700 font-bold text-sm border-b border-sky-50">
                                <span class="text-lg">🚀</span>
                                <span>远程搬运</span>
                            </button>
                            <!-- 查看进度 -->
                            <button @click="openProgressModal(); showUploadMenu = false"
                                    class="w-full flex items-center gap-3 px-4 py-3 hover:bg-sky-50 transition text-sky-700 font-bold text-sm">
                                <span class="text-lg">📋</span>
                                <span>搬运动态</span>
                                <span v-if="Object.keys(progressData).length > 0" class="ml-auto flex h-2 w-2 rounded-full bg-red-500"></span>
                            </button>
                        </div>
                        <!-- 点击外部关闭 -->
                        <div v-if="showUploadMenu" @click="showUploadMenu = false" class="fixed inset-0 z-20"></div>
                    </div>
                </nav>

                <teleport to="body">
                    <div v-if="showRemoteModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm">
                        <div class="glass p-6 w-full max-w-md shadow-2xl">
                            <h3 class="text-xl mb-4 text-sky-800 flex items-center gap-2">
                                <span>🚀</span> 远程搬运请求
                            </h3>
                            <p class="text-xs text-sky-500 mb-4">琪露诺会顺着网线帮你把东西抓回来！</p>
                            <input v-model="remoteUrl" type="text" placeholder="https://..." 
                                class="w-full mb-4 p-3 rounded-xl border-none ring-2 ring-sky-100 focus:ring-sky-400 outline-none text-sm">
                            <div class="flex gap-3">
                                <button @click="showRemoteModal = false" class="flex-1 py-2 rounded-lg font-bold text-sky-400 hover:bg-sky-50 transition">算了</button>
                                <button @click="submitRemoteUpload" class="flex-1 bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">开始搬运</button>
                            </div>
                        </div>
                    </div>

                    <div v-if="showProgressModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm">
                        <div class="glass w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
                            <div class="p-6 border-b border-sky-50 flex justify-between items-center">
                                <h3 class="text-xl text-sky-800">正在搬运的任务</h3>
                                <button @click="closeProgressModal" class="text-sky-300 hover:text-sky-600 text-2xl">×</button>
                            </div>
                            
                            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                                <div v-if="Object.keys(progressData).length === 0" class="text-center py-20 text-sky-300">
                                    <p class="text-4xl mb-2">🧊</p>
                                    <p>目前没有正在搬运的东西</p>
                                </div>
                                
                                <div v-for="(info, taskId) in progressData" :key="taskId" class="bg-white/40 p-4 rounded-2xl mb-3 border border-white">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="flex-1 min-w-0 mr-4">
                                            <span class="font-bold text-sky-800 truncate block" :title="info.filename">{{ info.displayName }}</span>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="text-xs px-2 py-0.5 rounded-full bg-sky-100 text-sky-600">
                                                    {{ info.username }}
                                                </span>
                                                <span v-if="info.type === 'remote'" class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-600">
                                                    远程搬运
                                                </span>
                                                <span v-else-if="info.type === 'local'" class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-600">
                                                    本地上传
                                                </span>
                                            </div>
                                        </div>
                                        <button @click.stop="cancelTask(taskId)" class="text-sky-400 hover:text-red-500 text-xl leading-none ml-2 px-2" title="取消任务">✖</button>
                                    </div>
                                    
                                    <div class="w-full h-3 bg-sky-100 rounded-full overflow-hidden p-0.5 border border-sky-50">
                                        <div class="h-full bg-gradient-to-r from-sky-300 to-blue-500 rounded-full transition-all duration-1000"
                                            :style="{ width: (info.downloadSize / info.expectedSize * 100) + '%' }">
                                        </div>
                                    </div>
                                    
                                    <div class="flex justify-between mt-2 text-[10px] text-sky-400">
                                        <span>{{ formatSize(info.downloadSize) }} / {{ formatSize(info.expectedSize) }}</span>
                                        <span class="font-bold">{{ Math.round(info.downloadSize / info.expectedSize * 100) }}%</span>
                                    </div>
                                    
                                    <div class="flex justify-between mt-1 text-[10px] text-sky-400">
                                        <span class="truncate max-w-[200px]" :title="info.filename">{{ info.path }}</span>
                                        <span>{{ formatSpeed(info.speed) }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 重命名 / 移动模态框 -->
                    <div v-if="showRenameModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm" @click.self="showRenameModal = false">
                        <div class="glass p-5 w-full max-w-sm shadow-2xl">
                            <h3 class="text-lg mb-3 text-sky-800 font-bold">{{ i18n.renameTitle }}</h3>
                            <div class="mb-3">
                                <label class="text-xs text-sky-500 block mb-1">{{ i18n.newName }}</label>
                                <input v-model="renameName" type="text"
                                    class="w-full p-2 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-400 outline-none text-sm">
                            </div>
                            <div class="mb-3">
                                <label class="text-xs text-sky-500 block mb-1">{{ i18n.targetLocation }}</label>
                                <div class="border border-sky-100 rounded-xl overflow-hidden">
                                    <div class="flex items-center gap-1 px-2 py-1.5 bg-sky-50/50 overflow-x-auto text-xs">
                                        <button @click="pickerGoToLevel(-1)" class="shrink-0 text-sky-400 hover:text-sky-600">📁</button>
                                        <template v-for="(seg, i) in pickerStack" :key="i">
                                            <span class="text-sky-300">/</span>
                                            <button @click="pickerGoToLevel(i)" class="shrink-0 text-sky-500 hover:text-sky-700 truncate max-w-[100px]">{{ seg.name }}</button>
                                        </template>
                                        <span class="text-sky-300">/</span>
                                    </div>
                                    <div class="max-h-32 overflow-y-auto p-1">
                                        <div v-for="d in pickerDirs" :key="d.name"
                                             @click="pickerEnter(d)"
                                             class="picker-dir flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer text-sm text-sky-700">
                                            <span>📁</span> {{ d.name }}
                                        </div>
                                        <div v-if="pickerDirs.length === 0" class="text-xs text-sky-300 text-center py-4">此目录下没有子目录</div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button @click="showRenameModal = false" class="flex-1 py-2 rounded-lg font-bold text-sky-400 hover:bg-sky-50 transition">取消</button>
                                <button @click="confirmRename" class="flex-1 bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">确认</button>
                            </div>
                        </div>
                    </div>

                    <!-- 复制模态框 -->
                    <div v-if="showCopyModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm" @click.self="showCopyModal = false">
                        <div class="glass p-5 w-full max-w-sm shadow-2xl">
                            <h3 class="text-lg mb-3 text-sky-800 font-bold">{{ i18n.copyTitle }}</h3>
                            <div class="mb-3">
                                <label class="text-xs text-sky-500 block mb-1">{{ i18n.newName }} <span class="text-sky-300">(可选)</span></label>
                                <input v-model="copyName" type="text"
                                    class="w-full p-2 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-400 outline-none text-sm">
                            </div>
                            <div class="mb-3">
                                <label class="text-xs text-sky-500 block mb-1">{{ i18n.targetLocation }}</label>
                                <div class="border border-sky-100 rounded-xl overflow-hidden">
                                    <div class="flex items-center gap-1 px-2 py-1.5 bg-sky-50/50 overflow-x-auto text-xs">
                                        <button @click="pickerGoToLevel(-1)" class="shrink-0 text-sky-400 hover:text-sky-600">📁</button>
                                        <template v-for="(seg, i) in pickerStack" :key="i">
                                            <span class="text-sky-300">/</span>
                                            <button @click="pickerGoToLevel(i)" class="shrink-0 text-sky-500 hover:text-sky-700 truncate max-w-[100px]">{{ seg.name }}</button>
                                        </template>
                                        <span class="text-sky-300">/</span>
                                    </div>
                                    <div class="max-h-32 overflow-y-auto p-1">
                                        <div v-for="d in pickerDirs" :key="d.name"
                                             @click="pickerEnter(d)"
                                             class="picker-dir flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer text-sm text-sky-700">
                                            <span>📁</span> {{ d.name }}
                                        </div>
                                        <div v-if="pickerDirs.length === 0" class="text-xs text-sky-300 text-center py-4">此目录下没有子目录</div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button @click="showCopyModal = false" class="flex-1 py-2 rounded-lg font-bold text-sky-400 hover:bg-sky-50 transition">取消</button>
                                <button @click="confirmCopy" class="flex-1 bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">确认</button>
                            </div>
                        </div>
                    </div>

                    <!-- 删除确认模态框 -->
                    <div v-if="showDeleteConfirm" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm" @click.self="showDeleteConfirm = false">
                        <div class="glass p-6 w-full max-w-xs shadow-2xl text-center">
                            <div class="text-4xl mb-3">⚠️</div>
                            <h3 class="text-lg mb-2 text-sky-800 font-bold">{{ i18n.deleteTitle }}</h3>
                            <p class="text-sm text-sky-600 mb-1 font-bold truncate">{{ opsTarget?.name }}</p>
                            <p class="text-xs text-sky-400 mb-1">{{ i18n.deleteConfirm }}</p>
                            <p class="text-xs text-red-400 mb-4">{{ i18n.deleteWarning }}</p>
                            <div class="flex gap-3">
                                <button @click="showDeleteConfirm = false" class="flex-1 py-2 rounded-lg font-bold text-sky-400 hover:bg-sky-50 transition">取消</button>
                                <button @click="confirmDelete" class="flex-1 bg-red-500 text-white py-2 rounded-lg font-bold hover:bg-red-600 transition">删除</button>
                            </div>
                        </div>
                    </div>
                    <!-- 新建文件夹模态框 -->
                    <div v-if="showMkdirModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-sky-900/20 backdrop-blur-sm" @click.self="showMkdirModal = false">
                        <div class="glass p-5 w-full max-w-xs shadow-2xl">
                            <h3 class="text-lg mb-3 text-sky-800 font-bold">{{ i18n.mkdirTitle }}</h3>
                            <div class="mb-4">
                                <label class="text-xs text-sky-500 block mb-1">{{ i18n.mkdirLabel }}</label>
                                <input v-model="mkdirName" type="text" @keyup.enter="confirmMkdir"
                                    class="w-full p-2 rounded-lg border-none ring-2 ring-sky-100 focus:ring-sky-400 outline-none text-sm">
                            </div>
                            <div class="flex gap-3">
                                <button @click="showMkdirModal = false" class="flex-1 py-2 rounded-lg font-bold text-sky-400 hover:bg-sky-50 transition">取消</button>
                                <button @click="confirmMkdir" class="flex-1 bg-sky-500 text-white py-2 rounded-lg font-bold hover:bg-sky-600 transition">创建</button>
                            </div>
                        </div>
                    </div>
                </teleport>

                <div class="flex-1 p-2 overflow-y-auto">
                    <!-- ── 搜索结果（整库搜，优先于一切浏览视图）── -->
                    <div v-if="isSearching" class="p-1">
                        <div v-if="searchTreeLoading" class="flex flex-col items-center justify-center py-20 text-sky-400">
                            <div class="text-4xl animate-bounce">🧊</div>
                            <p class="mt-4">琪露诺正在翻遍整个书库...</p>
                        </div>
                        <div v-else>
                            <p class="text-xs text-sky-400 px-2 mb-2">找到 {{ searchResults.length }} 个结果<span v-if="searchResults.length >= 200">（只显示前 200 个，缩小关键词试试）</span></p>
                            <!-- 连载聚合结果 -->
                            <div v-for="(r, i) in searchResults" :key="i"
                                 @click="goToSearchResult(r)"
                                 class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-sky-50 cursor-pointer transition border-b border-sky-50/60">
                                <template v-if="r.type === 'series'">
                                    <span class="text-xl shrink-0">📚</span>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-sm text-sky-800 font-bold truncate">
                                            {{ r.name }}
                                            <span class="ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full bg-pink-100 text-pink-500 font-normal align-middle">连载</span>
                                        </div>
                                        <div class="text-[11px] text-sky-400 truncate">{{ resultPath(r.groupTrail) }}</div>
                                    </div>
                                </template>
                                <template v-else>
                                    <span class="text-xl shrink-0">{{ r.node.type === 'dir' ? '📁' : fileTypeIcon(r.node.name) }}</span>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-sm text-sky-800 font-bold truncate">{{ r.node.name }}</div>
                                        <div class="text-[11px] text-sky-400 truncate">{{ resultPath(r.trail) }}</div>
                                    </div>
                                </template>
                            </div>
                            <div v-if="searchResults.length === 0" class="text-center py-24 text-sky-300">
                                <p class="text-4xl mb-2">🫧</p>
                                <p>什么都没找到呢</p>
                            </div>
                        </div>
                    </div>

                    <div v-else-if="loading" class="flex flex-col items-center justify-center py-20 text-sky-400">
                        <div class="text-4xl animate-bounce">🧊</div>
                        <p class="mt-4">琪露诺正在数数...</p>
                    </div>

                    <!-- ── 汉化组/连载分组网格（封面墙卡片）── -->
                    <div v-else-if="currentIsGroupGrid" class="manga-grid">
                        <div v-for="g in sortedFiles" :key="g.name" class="group-card" @click="handleItemClick(g)">
                            <div class="group-wall">
                                <template v-for="(b, i) in groupBooks(g)" :key="i">
                                    <img v-if="coverMap[g.name + '/' + b.name]" :src="coverMap[g.name + '/' + b.name]" loading="lazy" draggable="false">
                                    <div v-else class="empty"></div>
                                </template>
                                <!-- 不足4张补空格 -->
                                <div v-for="n in (4 - groupBooks(g).length)" :key="'e'+n" class="empty"></div>
                            </div>
                            <div class="group-glass">
                                <div class="group-name">{{ g.name }}</div>
                                <div class="group-count">{{ groupBookCount(g) }} 本</div>
                            </div>
                        </div>
                    </div>

                    <!-- ── 连载话列表视图 ── -->
                    <div v-else-if="currentSeries" class="flex flex-col h-full">
                        <div class="px-3 py-2 border-b border-sky-50 flex items-center gap-2 shrink-0">
                            <button @click="closeSeries()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-sky-100/50 text-sky-600 text-lg hover:bg-sky-200 transition">←</button>
                            <span class="font-bold text-sky-800 truncate">{{ currentSeries.name }}</span>
                            <span class="text-xs text-sky-400 ml-auto">{{ currentSeries.chapters.length }} 话</span>
                        </div>
                        <div class="manga-grid flex-1 overflow-y-auto p-2">
                            <div v-for="ch in currentSeries.chapters" :key="ch.name" class="poster" @click="openChapter(ch)">
                                <img v-if="coverMap[ch.name]" :src="coverMap[ch.name]" class="poster-img" loading="lazy" draggable="false">
                                <div v-else class="poster-placeholder">📖</div>
                                <div class="poster-badge">{{ bookPageCount(ch) }}P</div>
                                <div class="poster-glass">
                                    <div class="poster-title">{{ ch.name }}</div>
                                    <div class="poster-sub">{{ bookPageCount(ch) }} 页</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ── 漫画海报网格模式（含漫画本时启用，聚合同作品多话/多卷）── -->
                    <div v-else-if="currentIsBookGrid" class="manga-grid">
                        <template v-for="item in aggregatedBooks" :key="item.name">
                            <!-- 连载作品：聚合卡（多话/多卷合一张，封面取第1话首图）-->
                            <div v-if="item.type === 'series'" class="poster" @click="openSeries(item)">
                                <img v-if="coverMap[item.coverNode.name]" :src="coverMap[item.coverNode.name]" class="poster-img" loading="lazy" draggable="false">
                                <div v-else class="poster-placeholder">📚</div>
                                <div class="poster-badge">{{ item.chapters.length }}话</div>
                                <div class="poster-glass">
                                    <div class="poster-title">{{ item.name }}</div>
                                    <div class="poster-sub">{{ (bookMeta[item.coverNode.name] && bookMeta[item.coverNode.name].author) || '' }}</div>
                                </div>
                            </div>
                            <!-- 单行本：海报卡片（标题取 article.md，回退目录名）-->
                            <div v-else-if="item.type === 'book'" class="poster" @click="handleItemClick(item.node)">
                                <img v-if="coverMap[item.node.name]" :src="coverMap[item.node.name]" class="poster-img" loading="lazy" draggable="false">
                                <div v-else class="poster-placeholder">📖</div>
                                <div class="poster-badge">{{ bookPageCount(item.node) }}P</div>
                                <div v-if="bookMeta[item.node.name] && bookMeta[item.node.name].source" class="poster-source">{{ bookMeta[item.node.name].source }}</div>
                                <div class="poster-glass">
                                    <div class="poster-title">{{ bookTitle(item.node) }}</div>
                                    <div class="poster-sub" :title="bookMeta[item.node.name] && bookMeta[item.node.name].author">
                                        {{ (bookMeta[item.node.name] && bookMeta[item.node.name].author) || '' }}
                                    </div>
                                </div>
                            </div>
                            <!-- 非漫画子目录：简易卡片，可点入 -->
                            <div v-else-if="item.type === 'dir'" class="poster" @click="handleItemClick(item.node)">
                                <div class="poster-placeholder">📁</div>
                                <div class="poster-glass">
                                    <div class="poster-title">{{ item.name }}</div>
                                    <div class="poster-sub">{{ (item.node.children || []).length }} 项</div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- ── 普通文件列表模式 ── -->
                    <div v-else>
                        <div v-for="item in sortedFiles" :key="item.name"
                            @click="handleItemClick(item)"
                            class="file-card group flex items-center justify-between p-3 md:p-4 rounded-2xl cursor-pointer transition-all mb-2 relative"
                            :style="opsPanelFor === item ? { zIndex: 50 } : {}">
                            
                            <div class="flex items-center gap-3 md:gap-4 flex-1 min-w-0">
                                
                                <img v-if="item.type === 'file' && isImageFile(item.name) && thumbMap[item.name]"
                                    :src="thumbMap[item.name]"
                                    class="shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-lg object-cover bg-sky-50"
                                    draggable="false">
                                <span v-else class="text-2xl md:text-3xl shrink-0 w-10 h-10 md:w-12 md:h-12 flex items-center justify-center">
                                    {{ item.type === 'dir' ? '📁' : fileTypeIcon(item.name) }}
                                </span>

                                <div class="flex flex-col min-w-0 pr-2">
                                    <span class="text-slate-700 font-bold truncate text-sm md:text-base block">
                                        {{ item.name }}
                                    </span>
                                    
                                    <span class="text-[10px] text-slate-400 uppercase tracking-widest" v-if="item.type === 'file'">
                                        {{ formatSize(item.size) }}
                                    </span>
                                </div>
                            </div>

                            <div class="flex gap-2 items-center shrink-0 ml-2">
                                <!-- 操作按钮（写操作，仅 admin 可见） -->
                                <div v-if="isAdmin" class="relative">
                                    <button @click.stop.prevent="toggleOpsPanel(item)"
                                            @mousedown.stop.prevent
                                            class="js-ops-btn ops-btn px-3 py-1.5 text-sm flex items-center gap-1 whitespace-nowrap select-none">
                                        操作
                                    </button>
                                    <!-- 操作面板 -->
                                    <div v-if="opsPanelFor === item"
                                         @click.stop
                                         class="js-ops-panel absolute right-0 top-full mt-1 w-36 glass shadow-xl z-50 overflow-hidden rounded-2xl border border-white/80"
                                         style="animation: dropDown 0.15s ease-out">
                                        <button @click.stop="startRename(item)"
                                                class="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-sky-50 transition text-sky-700 font-bold text-sm border-b border-sky-50">
                                            <span>✏️</span> {{ i18n.opsRename }}
                                        </button>
                                        <button @click.stop="startCopy(item)"
                                                class="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-sky-50 transition text-sky-700 font-bold text-sm border-b border-sky-50">
                                            <span>📋</span> {{ i18n.opsCopy }}
                                        </button>
                                        <button @click.stop="startDelete(item)"
                                                class="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-red-50 transition text-red-500 font-bold text-sm">
                                            <span>🗑️</span> {{ i18n.opsDelete }}
                                        </button>
                                    </div>
                                </div>
                                <button v-if="item.type === 'file'"
                                        @click.stop="downloadFile(item.name)"
                                        class="download-btn px-4 py-1.5 text-sm flex items-center gap-1 whitespace-nowrap">
                                    下载
                                </button>
                            </div>
                        </div>

                        <div v-if="sortedFiles.length === 0" class="text-center py-32 opacity-20">
                            <p class="text-6xl mb-4">空</p>
                            <p>琪露诺把这里清空了</p>
                        </div>
                    </div>
                </div>

                <footer class="p-4 text-[10px] text-sky-300 flex justify-between border-t border-sky-50">
                    <span>状态: 零下 {{ Math.floor(Math.random() * 9 + 1) }} 度</span>
                    <span>BAKA BAKA</span>
                </footer>
            </div>
        </div>
    </div>



    <!-- ======= 文件查看器 ======= -->
    <teleport to="body">
        <div v-if="viewer.show" class="fixed inset-0 z-[200] flex items-center justify-center"
            style="background:rgba(0,0,0,0.85);backdrop-filter:blur(4px)"
            @click.self="closeViewer">

            <!-- 图片查看器 -->
            <template v-if="viewer.type === 'image'">
            <div class="relative w-full h-full flex items-center justify-center"
                @touchstart="onViewerTouchStart" @touchend="onViewerTouchEnd">
                <!-- 关闭 -->
                <button @click="closeViewer"
                class="absolute top-4 right-4 z-10 text-white/70 hover:text-white text-4xl leading-none transition">×</button>
                <!-- 计数 -->
                <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10 text-white/60 text-sm bg-black/30 px-3 py-1 rounded-full">
                {{ viewerImageIndex + 1 }} / {{ viewerImageList.length }}
                </div>
                <!-- 文件名 -->
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 text-white/60 text-xs bg-black/30 px-3 py-1 rounded-full max-w-[80vw] truncate">
                {{ viewerImageList[viewerImageIndex]?.name }}
                </div>
                <!-- 主图：key 按页名强制重建，清空→解码完→赋值，新图上去就是完整帧 -->
                <img v-if="viewerCurrentImageUrl" :src="viewerCurrentImageUrl" :key="'main-'+(viewerImageList[viewerImageIndex]?.name)"
                    class="absolute inset-0 m-auto object-contain select-none"
                    style="max-height:90vh;max-width:90vw;"
                    draggable="false">
                <!-- 翻页按钮（‹ › 字形基线偏下，用内层 span + 负 margin 视觉居中）-->
                <button v-if="viewerImageIndex > 0" @click="viewerPrev"
                class="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 z-10 text-white/70 hover:text-white text-5xl leading-none transition bg-black/20 rounded-full w-12 h-12 flex items-center justify-center">
                    <span class="block" style="margin-top:-0.12em;margin-right:0.08em;">‹</span></button>
                <button v-if="viewerImageIndex < viewerImageList.length - 1" @click="viewerNext"
                class="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 z-10 text-white/70 hover:text-white text-5xl leading-none transition bg-black/20 rounded-full w-12 h-12 flex items-center justify-center">
                    <span class="block" style="margin-top:-0.12em;margin-left:0.08em;">›</span></button>
            </div>
            </template>

            <!-- 视频播放器 -->
            <template v-if="viewer.type === 'video'">
            <div class="relative w-full max-w-4xl mx-4 flex flex-col items-center">
                <button @click="closeViewer"
                class="absolute -top-10 right-0 text-white/70 hover:text-white text-3xl leading-none transition">×</button>
                <div class="text-white/60 text-sm mb-3 max-w-full truncate px-2">{{ viewerFileName }}</div>
                <video :src="viewerVideoUrl" controls autoplay
                    class="w-full rounded-2xl shadow-2xl"
                    style="max-height:80vh;background:#000;">
                你的浏览器不支持视频播放
                </video>
            </div>
            </template>

            <!-- 文本阅读器 -->
            <template v-if="viewer.type === 'text'">
            <div class="relative w-full max-w-3xl mx-4 flex flex-col"
                style="max-height:85vh;">
                <button @click="closeViewer"
                class="absolute -top-10 right-0 text-white/70 hover:text-white text-3xl leading-none transition">×</button>
                <div class="glass flex flex-col overflow-hidden" style="max-height:85vh;">
                <div class="px-5 py-3 border-b border-sky-100 flex items-center justify-between shrink-0">
                    <span class="font-bold text-sky-800 truncate max-w-[80%]">{{ viewerFileName }}</span>
                    <span class="text-xs text-sky-400 ml-2 shrink-0">{{ viewerFileExt }} · {{ formatSize(viewerFileSize) }}</span>
                </div>
                <!-- 文件太大 -->
                <div v-if="viewerTextTooLarge" class="flex flex-col items-center justify-center py-16 gap-4">
                    <span class="text-5xl">📦</span>
                    <p class="text-sky-600 font-bold">文件过大，无法预览</p>
                    <p class="text-sky-400 text-sm">{{ formatSize(viewerFileSize) }} · 超过 10 KB 限制</p>
                    <button @click="downloadFile(viewerFileName)"
                    class="download-btn px-6 py-2 text-sm mt-2 inline-block text-center rounded-xl">下载文件</button>
                </div>
                <!-- 加载中 -->
                <div v-else-if="viewerLoading" class="flex items-center justify-center py-16">
                    <div class="text-3xl animate-bounce">🧊</div>
                </div>
                <!-- 文本内容 -->
                <div v-else class="overflow-y-auto flex-1 p-5">
                    <pre class="text-sm text-slate-700 whitespace-pre-wrap break-words font-mono leading-relaxed">{{ viewerTextContent }}</pre>
                </div>
                </div>
            </div>
            </template>

            <!-- 其他文件 -->
            <template v-if="viewer.type === 'other'">
            <div class="relative glass mx-4 p-8 flex flex-col items-center gap-5 min-w-[260px] max-w-sm w-full">
                <button @click="closeViewer"
                class="absolute top-3 right-4 text-sky-300 hover:text-sky-600 text-2xl leading-none transition">×</button>
                <div class="text-6xl mt-2">{{ fileTypeIcon(viewerFileName) }}</div>
                <div class="text-center">
                <p class="font-bold text-sky-800 break-all text-sm leading-snug">{{ viewerFileName }}</p>
                <p class="text-sky-400 text-xs mt-1">{{ viewerFileExt || '未知类型' }} · {{ formatSize(viewerFileSize) }}</p>
                </div>
                <button @click="downloadFile(viewerFileName); closeViewer()"
                class="download-btn px-8 py-2 text-sm mt-1 inline-block text-center rounded-xl w-full text-center">⬇ 下载</button>
            </div>
            </template>

        </div>
    </teleport>

    <div class="footer">
        <a href="https://github.com/northwindlight/bakaWFS" target="_blank" rel="noopener">GitHub</a>
    </div>

    </template><!-- end auth guard -->
</div>

</body>
</html>
