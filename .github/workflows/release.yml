name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o bakaWFS-${{ matrix.suffix }}${{ matrix.ext || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakaWFS-${{ matrix.suffix }}
          path: bakaWFS-${{ matrix.suffix }}${{ matrix.ext || '' }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges --format="%s")
          else
            COMMITS=$(git log --oneline --no-merges --format="%s" ${PREV_TAG}..HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            echo "## ${{ github.ref_name }}" > release_notes.md
            echo "无新提交。" >> release_notes.md
            exit 0
          fi

          jq -n --arg commits "$COMMITS" '{
            model: "deepseek-v4-flash",
            max_tokens: 800,
            messages: [{
              role: "user",
              content: "用2-3句简洁中文总结以下提交内容，只描述用户可感知的变化。\n\n\($commits)"
            }]
          }' > /tmp/payload.json

          curl -s https://api.deepseek.com/anthropic/v1/messages \
            -H "x-api-key: ${{ secrets.DEEPSEEK_API_KEY }}" \
            -H "content-type: application/json" \
            -d @/tmp/payload.json | jq -r '.content[] | select(.type == "text") | .text' > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bakaWFS-*
          body_path: release_notes.md
