# baka-file-server 配置文件

address: "0.0.0.0"
https_port: 8443 # 端口设为 -1 表示关闭该协议。两者同时开启时，HTTP 会重定向到 HTTPS。
http_port:  -1

# JWT 签名密钥，必须修改为随机字符串，留空则启动失败
secret: "dev-secret-⑨"

cert_path: "certificate.crt"
key_path:  "private.key"

file_dir:   "files"
html_dir:   "html"
temp_dir:   ".uploads"
users_file: "users.yaml"

# 并发远程下载 worker 数量
download_workers: 2

# 审计日志路径，留空则关闭
audit_log: ""

# 跨域支持，默认关闭。开启后前端可跨域下载文件
cors_enabled: false
